name: Update stats cards

on:
  schedule:
    - cron: "17 0 * * *" # daily 09:17 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats SVGs (retry until valid)
        run: |
          mkdir -p assets
          fetch() {
            local url="$1" out="$2"
            for i in $(seq 1 10); do
              curl -sf --max-time 60 "$url" -o "$out.tmp" || { sleep 30; continue; }
              if grep -q "Something went wrong" "$out.tmp"; then
                sleep 30
                continue
              fi
              mv "$out.tmp" "$out"
              return 0
            done
            echo "failed to fetch $url after 10 attempts" >&2
            return 1
          }
          base="https://github-readme-stats-sora-bluesky.vercel.app"
          fetch "$base/api?username=Sora-bluesky&show_icons=true&hide=contribs&theme=tokyonight&hide_border=true" assets/stats.svg
          fetch "$base/api/top-langs/?username=Sora-bluesky&layout=compact&theme=tokyonight&hide_border=true" assets/top-langs.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update stats cards"
            git push
          fi
